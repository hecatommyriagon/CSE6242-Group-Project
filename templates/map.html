<!doctype html>
<html>
  <head>
    <title>RENT vs BUY</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
      #map {
        height: 90vh;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div
      style="
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1em;
      "
    >
      <h1 style="margin: 0">Rent vs Buy</h1>
      <div style="position: relative">
        <input
          id="city-search"
          type="text"
          placeholder="Search city..."
          style="width: 300px; padding: 4px"
          autocomplete="off"
        />
        <div
          id="autocomplete-list"
          style="
            border: 1px solid #ccc;
            max-height: 150px;
            overflow-y: auto;
            position: absolute;
            background: white;
            z-index: 1000;
            width: 100%;
          "
        ></div>
      </div>
    </div>
    <div id="map"></div>
    <div
      id="city-popup"
      style="
        display: none;
        position: fixed;
        left: 50%;
        top: 20%;
        transform: translate(-50%, 0);
        background: #fff;
        border-radius: 16px;
        border: none;
        padding: 28px 32px 24px 32px;
        z-index: 2000;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
        min-width: 340px;
        min-height: 220px;
        font-family:
          &quot;Segoe UI&quot;, &quot;Roboto&quot;, Arial, sans-serif;
        color: #222;
      "
    >
      <span
        id="city-close"
        style="
          float: right;
          cursor: pointer;
          font-size: 24px;
          color: #888;
          margin-top: -8px;
          margin-right: -8px;
        "
        title="Close popup"
        >&times;</span
      >
      <h2
        id="city-title"
        style="margin-top: 0; font-size: 1.4em; font-weight: 600"
      ></h2>
      <div id="statistics" style="margin-bottom: 18px"></div>
      <canvas
        id="cost-chart"
        width="500"
        height="220"
        style="margin-top: 8px"
      ></canvas>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
      // Debug logger
      function debugLog(...args) {
          if (window.DEBUG_UI) console.log('[MAP DEBUG]', ...args);
      }
      window.DEBUG_UI = true;

      // Draggable popup logic
      (function() {
          const popup = document.getElementById('city-popup');
          let isDragging = false, offsetX = 0, offsetY = 0;
          popup.addEventListener('mousedown', function(e) {
              if (e.target.id === 'city-close') return;
              isDragging = true;
              offsetX = e.clientX - popup.offsetLeft;
              offsetY = e.clientY - popup.offsetTop;
              document.body.style.userSelect = 'none';
          });
          document.addEventListener('mousemove', function(e) {
              if (isDragging) {
                  popup.style.left = e.clientX - offsetX + 'px';
                  popup.style.top = e.clientY - offsetY + 'px';
                  popup.style.transform = '';
              }
          });
          document.addEventListener('mouseup', function() {
              isDragging = false;
              document.body.style.userSelect = '';
          });
      })();

      // Chart.js for line chart
      const chartScript = document.createElement('script');
      chartScript.src = 'https://cdn.jsdelivr.net/npm/chart.js';
      document.head.appendChild(chartScript);

      let cityList = [];
      let chartInstance = null;

      async function fetchCities() {
          const resp = await fetch('/api/data/cities');
          cityList = await resp.json();
      }

      function autocomplete(inp, arr) {
          let currentFocus;
          inp.addEventListener('input', function() {
              let val = this.value;
              closeAllLists();
              if (!val) return false;
              currentFocus = -1;
              const listDiv = document.getElementById('autocomplete-list');
              listDiv.innerHTML = '';
              arr.filter(c => c.toLowerCase().includes(val.toLowerCase())).slice(0, 10).forEach(city => {
                  let item = document.createElement('div');
                  item.innerHTML = city;
                  item.style.padding = '4px';
                  item.style.cursor = 'pointer';
                  item.onclick = function() {
                      inp.value = city;
                      closeAllLists();
                      showCityChart(city, true);
                  };
                  listDiv.appendChild(item);
              });
              listDiv.style.display = arr.length ? 'block' : 'none';
          });
          inp.addEventListener('keydown', function(e) {
              let listDiv = document.getElementById('autocomplete-list');
              let items = listDiv.getElementsByTagName('div');
              if (e.keyCode == 40) { // down
                  currentFocus++;
                  addActive(items);
              } else if (e.keyCode == 38) { // up
                  currentFocus--;
                  addActive(items);
              } else if (e.keyCode == 13) { // enter
                  e.preventDefault();
                  if (currentFocus > -1 && items[currentFocus]) {
                      items[currentFocus].click();
                  }
              }
          });
          function addActive(items) {
              if (!items) return false;
              removeActive(items);
              if (currentFocus >= items.length) currentFocus = 0;
              if (currentFocus < 0) currentFocus = items.length - 1;
              items[currentFocus].classList.add('autocomplete-active');
          }
          function removeActive(items) {
              for (let i = 0; i < items.length; i++) {
                  items[i].classList.remove('autocomplete-active');
              }
          }
          function closeAllLists() {
              document.getElementById('autocomplete-list').innerHTML = '';
              document.getElementById('autocomplete-list').style.display = 'none';
          }
          document.addEventListener('click', function (e) {
              // Only close autocomplete if not clicking on input or popup
              const popup = document.getElementById('city-popup');
              if (e.target !== inp && !popup.contains(e.target)) closeAllLists();
          });
      }

            // Human-readable labels for statistics
            const STAT_LABELS = {
                representative_monthly_cost: 'Typical Monthly Cost',
                estimated_income_needed: 'Estimated Income Needed',
                yoy_rent_change_pct: 'Year-over-Year Rent Change',
                yoy_buy_cost_change_pct: 'Year-over-Year Buy Cost Change',
                // Add more mappings as needed
            };


            function formatMoney(val) {
                if (typeof val !== 'number') val = Number(val);
                if (isNaN(val)) return val;
                return '$' + val.toLocaleString(undefined, { maximumFractionDigits: 0 });
            }

            function humanLabel(key) {
                return STAT_LABELS[key] || key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
            }

            async function showCityChart(city, panTo = false) {
                if (!window.Chart) {
                    await new Promise(res => chartScript.onload = res);
                }
                const resp = await fetch(`/api/data/${encodeURIComponent(city)}`);
                if (!resp.ok) {
                    alert('No data for city');
                    return;
                }
                const data = await resp.json();
                const renter = data.renter;
                const buyer = data.buyer;
                const popup = document.getElementById('city-popup');
                document.getElementById('city-title').textContent = city + ' — Rent vs Buy';
                // Always show and bring popup to front, even if already open
                popup.style.display = 'block';
                popup.style.visibility = 'visible';
                popup.style.zIndex = 2000;
                // Reset transform in case it was dragged
                popup.style.transform = '';
                // Show statistics with human labels and modern look
                let statsHtml = '';
                function formatStatValue(k, v) {
                    if (typeof v !== 'number') return v;
                    if (/change|pct|percent/i.test(k)) {
                        // Format as percent, show 2 decimals if not integer
                        return (Math.abs(v) < 1 ? (v * 100).toFixed(2) : v.toFixed(2)) + '%';
                    }
                    if (/cost|income|dollar|amount|price/i.test(k)) {
                        return formatMoney(v);
                    }
                    return v;
                }
                if (renter && renter.statistics) {
                    statsHtml += `<div style=\"margin-bottom: 8px;\"><span style='color:#3b82f6;font-weight:600;'>Renting</span><ul style='margin:4px 0 0 16px;padding:0;'>`;
                    for (const [k, v] of Object.entries(renter.statistics)) {
                        let val = formatStatValue(k, v);
                        statsHtml += `<li><span style='color:#555;'>${humanLabel(k)}:</span> <span style='color:#222;font-weight:500;'>${val}</span></li>`;
                    }
                    statsHtml += `</ul></div>`;
                }
                if (buyer && buyer.statistics) {
                    statsHtml += `<div style=\"margin-bottom: 8px;\"><span style='color:#ef4444;font-weight:600;'>Buying</span><ul style='margin:4px 0 0 16px;padding:0;'>`;
                    for (const [k, v] of Object.entries(buyer.statistics)) {
                        let val = formatStatValue(k, v);
                        statsHtml += `<li><span style='color:#555;'>${humanLabel(k)}:</span> <span style='color:#222;font-weight:500;'>${val}</span></li>`;
                    }
                    statsHtml += `</ul></div>`;
                }
                document.getElementById('statistics').innerHTML = statsHtml;
                // Prepare line chart data
                let dates = [];
                let rentVals = [];
                let buyVals = [];
                if (renter && renter.cost) {
                    try {
                        const costObj = typeof renter.cost === 'string' ? JSON.parse(renter.cost) : renter.cost;
                        dates = Object.keys(costObj);
                        rentVals = Object.values(costObj);
                    } catch {}
                }
                if (buyer && buyer.cost) {
                    try {
                        const costObj = typeof buyer.cost === 'string' ? JSON.parse(buyer.cost) : buyer.cost;
                        if (dates.length === 0) dates = Object.keys(costObj);
                        buyVals = Object.values(costObj);
                    } catch {}
                }
                if (chartInstance) chartInstance.destroy();
                const ctx = document.getElementById('cost-chart').getContext('2d');
                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: dates,
                        datasets: [
                            {
                                label: 'Rent',
                                data: rentVals,
                                borderColor: '#3b82f6',
                                backgroundColor: 'rgba(59,130,246,0.08)',
                                fill: false,
                                pointRadius: 0
                            },
                            {
                                label: 'Buy',
                                data: buyVals,
                                borderColor: '#ef4444',
                                backgroundColor: 'rgba(239,68,68,0.08)',
                                fill: false,
                                pointRadius: 0
                            }
                        ]
                    },
                    options: {
                        interaction: { mode: 'index', intersect: false },
                        plugins: { legend: { display: true } },
                        responsive: false,
                        scales: {
                            x: { title: { display: true, text: 'Date' }, ticks: { maxTicksLimit: 10 } },
                            y: { title: { display: true, text: 'Cost ($)' } }
                        }
                    }
                });
                // Always pan/zoom to city and add marker if lat/lon available
                if (renter && renter.latitude && renter.longitude) {
                    debugLog('showCityChart:', city, 'lat:', renter.latitude, 'lon:', renter.longitude);
                    // Position popup immediately relative to marker location
                    const point = map.latLngToContainerPoint([renter.latitude, renter.longitude]);
                    const mapRect = document.getElementById('map').getBoundingClientRect();
                    const popupRect = popup.getBoundingClientRect();
                    // Offset: 60px right, pin at vertical center of popup
                    popup.style.left = (mapRect.left + point.x + 60) + 'px';
                    popup.style.top = (mapRect.top + point.y - popupRect.height / 2) + 'px';
                    popup.style.transform = '';
                    popup.style.display = 'block';
                    popup.style.visibility = 'visible';
                }
            }

      document.getElementById('city-close').onclick = function() {
          document.getElementById('city-popup').style.display = 'none';
      };

      fetchCities().then(() => {
          const inp = document.getElementById('city-search');
          autocomplete(inp, cityList);
      });

      var map = L.map('map').setView([37.8, -96], 4);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap contributors'
      }).addTo(map);

            function formatCostTimeline(costDict) {
                let html = "<b>Cost Timeline:</b><br>";
                const dates = Object.keys(costDict).sort();
                dates.forEach(date => {
                    html += `${date}: ${formatMoney(costDict[date])}<br>`;
                });
                return html;
            }

      // Plot all points and bind popups
      const data = {{ data | tojson }};
      data.renters.forEach(d => {
          if (d.latitude && d.longitude) {
              const popupContent = `
                  <b>Renting</b><br>
                  ${d.city}, ${d.state}<br><br>
                  ${formatCostTimeline(d.cost)}
              `;
              const marker = L.circleMarker([d.latitude, d.longitude], {
                  color: "blue"
              }).addTo(map);
              marker.bindPopup(popupContent);
              marker.on('click', function() {
                  debugLog('Marker click:', d.city + ', ' + d.state);
                  showCityChart(d.city + ', ' + d.state);
              });
          } else {
              console.log("Could not make marker for: ", d)
          }
      });
      data.buyers.forEach(d => {
          if (d.latitude && d.longitude) {
              const popupContent = `
                  <b>Buying</b><br>
                  ${d.city}, ${d.state}<br><br>
                  ${formatCostTimeline(d.cost)}
              `;
              const marker = L.circleMarker([d.latitude, d.longitude], {
                  color: "red"
              }).addTo(map);
              marker.bindPopup(popupContent);
              marker.on('click', function() {
                  debugLog('Marker click:', d.city + ', ' + d.state);
                  showCityChart(d.city + ', ' + d.state);
              });
          } else {
              console.log("Could not make marker for: ", d)
          }
      });
    </script>
  </body>
</html>
